<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Neko - Art Nouveau Tarot Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Comfortaa:wght@400;700&display=swap');

        :root {
            --bg-cosmic: linear-gradient(135deg, #0b051d 0%, #12092e 40%, #1e133a 70%, #090314 100%);
            --gold: #dfb15b;
            --gold-glow: #fff099;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --glass-bg: rgba(25, 16, 54, 0.55);
            --glass-border: rgba(223, 177, 91, 0.25);
            --text-primary: #f5f3ff;
            --text-secondary: #c0b3e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-cosmic);
            color: var(--text-primary);
            font-family: 'Comfortaa', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(#fff, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 300px 300px;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            background: linear-gradient(to right, #fff, var(--gold), #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 1100px) {
            .studio-grid {
                grid-template-columns: 420px 1fr;
            }
        }

        .panel {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px 0 rgba(5, 2, 15, 0.6);
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border-bottom: 2px dashed var(--glass-border);
            padding-bottom: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 0.6rem;
        }

        input[type="text"], select {
            width: 100%;
            background: rgba(12, 6, 28, 0.8);
            border: 1px solid rgba(223, 177, 91, 0.3);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(223, 177, 91, 0.3);
        }

        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-results {
            position: absolute;
            top: 105%; left: 0; right: 0;
            background: #160c33;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            display: none;
        }

        .autocomplete-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .autocomplete-item:hover {
            background: rgba(223, 177, 91, 0.15);
            color: var(--gold-glow);
        }

        .neko-slot-box {
            background: rgba(12, 6, 28, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .slot-header {
            font-size: 0.9rem;
            color: var(--gold-glow);
            margin-bottom: 0.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .orientation-box {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .neko-toggle {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(223, 177, 91, 0.2);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .neko-toggle.active {
            background: rgba(223, 177, 91, 0.2);
            border-color: var(--gold);
            color: #fff;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            border: 2px solid var(--gold);
            color: white;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.5);
        }

        /* Spread Grid Canvas Area */
        .visual-spread-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3.5rem;
            padding: 2.5rem 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            min-height: 480px;
            align-items: center;
        }

        /* High-Fidelity Nouveau Card Frame Base */
        .card-frame {
            width: 240px;
            height: 410px;
            background: #110924;
            border: 1px solid #1a0f33;
            border-radius: 14px;
            position: relative;
            box-shadow: 0 16px 35px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
            cursor: pointer;
        }

        .card-frame:hover {
            box-shadow: 0 0 30px rgba(223, 177, 91, 0.5);
            transform: translateY(-8px);
        }

        .card-frame.reversed-node {
            transform: rotate(180deg);
        }

        .card-frame.reversed-node:hover {
            transform: rotate(180deg) translateY(8px);
        }

        /* SVG container scales flawlessly inside the frame */
        .card-art-canvas {
            width: 100%;
            height: 100%;
        }

        .card-art-canvas svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Analytical Matrix Block Elements */
        .matrix-block {
            background: rgba(15, 8, 36, 0.6);
            border: 1px solid rgba(223, 177, 91, 0.15);
            border-left: 4px solid var(--gold);
            padding: 2rem;
            border-radius: 8px 20px 20px 8px;
            margin-bottom: 2rem;
        }

        .matrix-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 0.6rem;
        }

        .matrix-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold-glow);
        }

        .orientation-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .orientation-badge.up { background: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 1px solid #00ffcc; }
        .orientation-badge.rev { background: rgba(244, 63, 94, 0.15); color: #f43f5e; border: 1px solid #f43f5e; }

        .meta-section {
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .summary-container {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(219, 39, 119, 0.1) 100%);
            border: 2px solid var(--gold);
            padding: 2rem;
            border-radius: 20px;
            margin-top: 3rem;
        }

        .summary-container h4 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
        }

        .placeholder-box {
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            padding: 5rem 0;
        }

        .ai-loading-container {
            text-align: center;
            padding: 3rem 0;
            color: var(--gold);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mystic Neko</h1>
        <p>Ornate Art Nouveau Studio • Deep Human Psychological Intelligence</p>
    </header>

    <div class="studio-grid">
        <div class="panel">
            <div class="panel-title">🔮 Inquiry Matrix</div>
            
            <div class="form-group">
                <label for="question">The Seeker's Question</label>
                <input type="text" id="question" placeholder="Enter your career, relationship, or soul path inquiry...">
            </div>

            <div class="form-group">
                <label for="spreadSelect">Spiritual Spread Formation</label>
                <select id="spreadSelect" onchange="initSpreadLayout()">
                    <option value="1card">1-Card Arcana (Instant Realignment)</option>
                    <option value="3card" selected>3-Card Anchor (Past, Present, Future)</option>
                    <option value="4card">4-Card Pattern (Situation, Obstacle, Advice, Outcome)</option>
                </select>
            </div>

            <div id="cardInputsContainer"></div>

            <button class="action-btn" onclick="generateAIReading()">Consult Gemini Matrix Engine 🔮</button>
        </div>

        <div class="panel" style="background: rgba(14, 8, 38, 0.85);">
            <div class="panel-title">🎨 Premium Arcana Spread Canvas</div>
            
            <div class="visual-spread-grid" id="visualSpread"></div>

            <div class="panel-title">📖 Deep AI Interpretation Analysis</div>
            <div id="interpretationOutput">
                <div class="placeholder-box">Formulate your inquiry and map your signatures to generate your analysis reading.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Core Human Tarot Meanings database
    const TAROT_DB = {
        "major_arcana": { name: "The Oracle Arcana", type: "major", colorBg: "#291632", colorAccent: "#581c61", label: "THE ORACLE", theme: "thorns" },
        "wands": { name: "The Suite of Embers", type: "wands", colorBg: "#3a1313", colorAccent: "#7a1a1a", label: "QUEEN OF EMBERS", theme: "embers" },
        "cups": { name: "The Suite of Depths", type: "cups", colorBg: "#12282d", colorAccent: "#1a464c", label: "QUEEN OF DEPTHS", theme: "depths" },
        "swords": { name: "The Suite of Thorns", type: "swords", colorBg: "#2b1924", colorAccent: "#542441", label: "QUEEN OF THORNS", theme: "thorns" },
        "pentacles": { name: "The Suite of Runes", type: "pentacles", colorBg: "#1d2616", colorAccent: "#384729", label: "QUEEN OF RUNES", theme: "runes" }
    };

    // Advanced Procedural Art Nouveau Graphic Composition Engine
    // Emulates borders, reflection lines, mirrors, frames, and theme elements from 1000_F_1911943441_LHPOM423acsismMtkuo16NxKjEskrhyM.jpg
    function getPremiumNouveauSvg(cardKey) {
        const card = TAROT_DB[cardKey] || TAROT_DB["major_arcana"];
        const bg = card.colorBg;
        const acc = card.colorAccent;
        const txt = card.label;

        // Base frame layout, outer custom color borders, card container
        let svg = `
        <svg viewBox="0 0 240 410" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff4b8"/>
                    <stop offset="30%" stop-color="#dfb15b"/>
                    <stop offset="70%" stop-color="#a67a2c"/>
                    <stop offset="100%" stop-color="#614311"/>
                </linearGradient>
                <clipPath id="innerOval">
                    <ellipse cx="120" cy="205" rx="92" ry="155" />
                </clipPath>
            </defs>

            <!-- Outer Dark Structural Border Card Rim -->
            <rect width="240" height="410" fill="#2d1d17" rx="14"/>
            <rect x="5" y="5" width="230" height="400" fill="#130b07" rx="10"/>
            <rect x="10" y="10" width="220" height="390" fill="${bg}" rx="8" stroke="url(#goldGrad)" stroke-width="2"/>
            
            <!-- Ornate Corner Filigree Swirl Decor lines -->
            <path d="M12 40 Q35 35 30 12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
            <path d="M228 40 Q205 35 210 12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
            <path d="M12 370 Q35 375 30 398" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
            <path d="M228 370 Q205 375 210 398" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>

            <!-- Central Portrait Mirror Frame Oval Box -->
            <ellipse cx="120" cy="205" rx="96" ry="159" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
            <ellipse cx="120" cy="205" rx="92" ry="155" fill="${acc}" />

            <!-- Themed Art Nouveau Illustration Assets (Rendered inside the Clip-Path Window) -->
            <g clip-path="url(#innerOval)">
        `;

        // Inject thematic artwork motifs extracted from 1000_F_1911943441_LHPOM423acsismMtkuo16NxKjEskrhyM.jpg
        if (card.theme === "thorns") {
            // QUEEN OF THORNS / ORACLE - Gnarled organic branches and vine structures woven around an oval mirror
            svg += `
                <!-- Background Halo Aura -->
                <circle cx="120" cy="120" r="50" fill="#f0d5a3" opacity="0.2"/>
                <circle cx="120" cy="290" r="50" fill="#f0d5a3" opacity="0.2"/>
                
                <!-- Intertwined thorn branches lines pattern -->
                <path d="M30 70 Q70 120 120 100 T210 70" fill="none" stroke="#1c0a14" stroke-width="6" stroke-linecap="round"/>
                <path d="M30 70 Q70 120 120 100 T210 70" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
                <path d="M30 340 Q70 290 120 310 T210 340" fill="none" stroke="#1c0a14" stroke-width="6" stroke-linecap="round"/>
                <path d="M30 340 Q70 290 120 310 T210 340" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
                
                <!-- Symmetrical Intricate Center Interlocking Vines -->
                <path d="M40 205 Q120 130 200 205 Q120 280 40 205" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
                <path d="M60 205 Q120 160 180 205 Q120 250 60 205" fill="none" stroke="#1c0a14" stroke-width="1.5"/>

                <!-- Stylized Symmetrical Figure Silhouettes (Up and Down Mirror) -->
                <g transform="translate(0, 35)">
                    <path d="M120 65 Q100 85 105 110 L135 110 Q140 85 120 65 Z" fill="#fcf4dc" stroke="#2d1522" stroke-width="2"/>
                    <path d="M105 110 Q80 135 70 160 L170 160 Q160 135 135 110 Z" fill="#421a31" stroke="#2d1522" stroke-width="2"/>
                    <!-- Crown -->
                    <path d="M108 67 L112 52 L120 60 L128 52 L132 67 Z" fill="url(#goldGrad)"/>
                </g>
                <g transform="translate(240, 375) rotate(180)">
                    <path d="M120 65 Q100 85 105 110 L135 110 Q140 85 120 65 Z" fill="#fcf4dc" stroke="#2d1522" stroke-width="2"/>
                    <path d="M105 110 Q80 135 70 160 L170 160 Q160 135 135 110 Z" fill="#421a31" stroke="#2d1522" stroke-width="2"/>
                    <path d="M108 67 L112 52 L120 60 L128 52 L132 67 Z" fill="url(#goldGrad)"/>
                </g>
            `;
        } else if (card.theme === "embers") {
            // QUEEN OF EMBERS - Roaring dynamic flame curls and warm organic highlights
            svg += `
                <!-- Radiant Solar Backdrop Core -->
                <ellipse cx="120" cy="205" rx="70" ry="120" fill="#e65c23" opacity="0.3"/>
                
                <!-- Dynamic Fire Waves vectors -->
                <path d="M30 250 Q60 180 120 220 T210 120 L210 410 L30 410 Z" fill="#c23a1a" opacity="0.5"/>
                <path d="M30 160 Q70 230 120 180 T210 280 L210 0 L30 0 Z" fill="#c23a1a" opacity="0.5"/>
                <path d="M40 205 C90 140 150 270 200 205" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

                <!-- Mystical Chalice Artifact Icons in hand loops -->
                <g transform="translate(0, 30)">
                    <path d="M120 65 Q100 85 105 115 L135 115 Q140 85 120 65 Z" fill="#fdf6e2" stroke="#4a120c" stroke-width="2"/>
                    <path d="M105 115 Q85 130 85 165 L155 165 Q155 130 135 115 Z" fill="#8f2115" stroke="#4a120c" stroke-width="2"/>
                    <!-- Holding out a cup/chalice -->
                    <path d="M165 100 Q180 100 180 115 L160 120 Z" fill="url(#goldGrad)"/>
                </g>
                <g transform="translate(240, 380) rotate(180)">
                    <path d="M120 65 Q100 85 105 115 L135 115 Q140 85 120 65 Z" fill="#fdf6e2" stroke="#4a120c" stroke-width="2"/>
                    <path d="M105 115 Q85 130 85 165 L155 165 Q155 130 135 115 Z" fill="#8f2115" stroke="#4a120c" stroke-width="2"/>
                    <path d="M165 100 Q180 100 180 115 L160 120 Z" fill="url(#goldGrad)"/>
                </g>
            `;
        } else if (card.theme === "depths") {
            // QUEEN OF DEPTHS - Aquatic waves, seashells, and serene maritime curves
            svg += `
                <!-- Underwater Coral & Bubble Shimmers -->
                <path d="M20 100 Q50 150 120 110 T220 150" fill="none" stroke="#21575e" stroke-width="8"/>
                <path d="M20 310 Q50 260 120 300 T220 260" fill="none" stroke="#21575e" stroke-width="8"/>
                <circle cx="50" cy="180" r="6" fill="#fff" opacity="0.3"/>
                <circle cx="190" cy="230" r="8" fill="#fff" opacity="0.2"/>

                <!-- Central Scallop/Shell Focal Axis -->
                <path d="M95 205 Q120 175 145 205 Q120 235 95 205 Z" fill="url(#goldGrad)"/>
                <line x1="120" y1="178" x2="120" y2="232" stroke="#12282d" stroke-width="1.5"/>
                <line x1="105" y1="190" x2="135" y2="220" stroke="#12282d" stroke-width="1"/>
                <line x1="100" y1="215" x2="140" y2="195" stroke="#12282d" stroke-width="1"/>

                <!-- Mermaid Sirens Figures Mirror Setup -->
                <g transform="translate(0, 32)">
                    <path d="M120 65 Q102 85 106 112 L134 112 Q138 85 120 65 Z" fill="#f3ebd4" stroke="#0e2326"/>
                    <path d="M106 112 Q85 125 80 165 L160 165 Q155 125 134 112 Z" fill="#184a52" stroke="#0e2326"/>
                    <!-- Fin Ears -->
                    <path d="M104 80 Q92 75 96 90 Z" fill="url(#goldGrad)"/>
                    <path d="M136 80 Q148 75 144 90 Z" fill="url(#goldGrad)"/>
                </g>
                <g transform="translate(240, 378) rotate(180)">
                    <path d="M120 65 Q102 85 106 112 L134 112 Q138 85 120 65 Z" fill="#f3ebd4" stroke="#0e2326"/>
                    <path d="M106 112 Q85 125 80 165 L160 165 Q155 125 134 112 Z" fill="#184a52" stroke="#0e2326"/>
                    <path d="M104 80 Q92 75 96 90 Z" fill="url(#goldGrad)"/>
                    <path d="M136 80 Q148 75 144 90 Z" fill="url(#goldGrad)"/>
                </g>
            `;
        } else if (card.theme === "runes") {
            // QUEEN OF RUNES - Earthly hooded figures, magical shields, and glowing runic alphabets
            svg += `
                <!-- Halo rings & Sacred geometry panels -->
                <circle cx="120" cy="115" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="3,3"/>
                <circle cx="120" cy="295" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="3,3"/>
                
                <!-- Scattered glowing Norse Elder Futhark runes geometric symbols -->
                <path d="M45 100 L55 115 M55 100 L45 115 M45 107 L55 107" stroke="url(#goldGrad)" stroke-width="1.5"/> <!-- Hagall -->
                <path d="M185 100 L195 115 M185 100 L185 115 M185 107 L195 107" stroke="url(#goldGrad)" stroke-width="1.5"/> 
                <path d="M45 300 L55 315 L45 310 L55 300" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/> 
                
                <path d="M35 205 L205 205" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

                <!-- Druidic Hooded Mystics Mirror Structure -->
                <g transform="translate(0, 35)">
                    <!-- Deep Cowl Hood covering sides of face -->
                    <path d="M120 62 Q92 65 96 115 L144 115 Q148 65 120 62 Z" fill="#2d3f20" stroke="#121d0d" stroke-width="2"/>
                    <path d="M120 70 Q108 82 110 115 L130 115 Q132 82 120 70 Z" fill="#faeed1"/>
                    <path d="M96 115 Q75 130 75 160 L165 160 Q165 130 144 115 Z" fill="#3f5430" stroke="#121d0d" stroke-width="2"/>
                </g>
                <g transform="translate(240, 375) rotate(180)">
                    <path d="M120 62 Q92 65 96 115 L144 115 Q148 65 120 62 Z" fill="#2d3f20" stroke="#121d0d" stroke-width="2"/>
                    <path d="M120 70 Q108 82 110 115 L130 115 Q132 82 120 70 Z" fill="#faeed1"/>
                    <path d="M96 115 Q75 130 75 160 L165 160 Q165 130 144 115 Z" fill="#3f5430" stroke="#121d0d" stroke-width="2"/>
                </g>
            `;
        }

        svg += `
            </g> <!-- End of Clip Path Window -->

            <!-- Ornate Typography Banner Ribbons (Matches top and bottom labels perfectly) -->
            <!-- Top Banner -->
            <path d="M45 35 L195 35 L180 55 L60 55 Z" fill="#130b07" stroke="url(#goldGrad)" stroke-width="1.5"/>
            <text x="120" y="49" fill="url(#goldGrad)" font-family="'Cinzel', serif" font-weight="bold" font-size="10" text-anchor="middle" letter-spacing="2">QUEEN</text>

            <!-- Bottom Title Banner Ribbon -->
            <path d="M30 355 L210 355 L195 380 L45 380 Z" fill="#130b07" stroke="url(#goldGrad)" stroke-width="1.5"/>
            <text x="120" y="373" fill="url(#goldGrad)" font-family="'Cinzel', serif" font-weight="bold" font-size="9" text-anchor="middle" letter-spacing="1">${txt}</text>
        </svg>
        `;
        return svg;
    }

    const SPREAD_CONFIGS = {
        "1card": { count: 1, positions: ["Core Alignment / Current Portal"] },
        "3card": { count: 3, positions: ["Past Foundation", "Active Present Situation", "Unfolding Future Destiny"] },
        "4card": { count: 4, positions: ["Current Foundation", "Immediate Roadblock", "Higher Mind Advice", "Targeted Future Outcome"] }
    };

    let currentCardOrientations = [];

    function initSpreadLayout() {
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const container = document.getElementById("cardInputsContainer");
        
        container.innerHTML = "";
        currentCardOrientations = [];

        for (let i = 0; i < config.count; i++) {
            currentCardOrientations.push("upright");

            const slot = document.createElement("div");
            slot.className = "neko-slot-box";
            slot.innerHTML = `
                <div class="slot-header">
                    <span>🔮 Arcana Node #${i + 1}</span>
                    <span style="color: var(--gold); font-family: 'Cinzel';">${config.positions[i]}</span>
                </div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="neko_search_${i}" placeholder="Type Suite Name (Thorns, Embers, Depths, Runes)..." oninput="handleSearchInput(${i})">
                    <input type="hidden" id="card_sel_${i}">
                    <div class="autocomplete-results" id="neko_res_${i}"></div>
                </div>
                <div class="orientation-box">
                    <button id="btn_u_${i}" class="neko-toggle active" onclick="setOrientation(${i}, 'upright')">Upright ☀️</button>
                    <button id="btn_r_${i}" class="neko-toggle" onclick="setOrientation(${i}, 'reversed')">Reversed 🌙</button>
                </div>
            `;
            container.appendChild(slot);
        }
        updateVisuals();
    }

    function handleSearchInput(index) {
        const inputField = document.getElementById(`neko_search_${index}`);
        const hiddenField = document.getElementById(`card_sel_${index}`);
        const resultBox = document.getElementById(`neko_res_${index}`);
        const query = inputField.value.toLowerCase().trim();

        if (!query) {
            hiddenField.value = "";
            resultBox.style.display = "none";
            updateVisuals();
            return;
        }

        let filtered = Object.keys(TAROT_DB).filter(key => 
            TAROT_DB[key].name.toLowerCase().includes(query) || TAROT_DB[key].label.toLowerCase().includes(query)
        );

        resultBox.innerHTML = "";
        filtered.forEach(key => {
            const item = document.createElement("div");
            item.className = "autocomplete-item";
            item.innerText = TAROT_DB[key].name;
            item.onclick = () => {
                inputField.value = TAROT_DB[key].name;
                hiddenField.value = key;
                resultBox.style.display = "none";
                updateVisuals();
            };
            resultBox.appendChild(item);
        });
        resultBox.style.display = filtered.length ? "block" : "none";
    }

    function setOrientation(index, status) {
        currentCardOrientations[index] = status;
        const uprightBtn = document.getElementById(`btn_u_${index}`);
        const reversedBtn = document.getElementById(`btn_r_${index}`);
        
        if (status === "upright") {
            uprightBtn.classList.add("active");
            reversedBtn.classList.remove("active");
        } else {
            reversedBtn.classList.add("active");
            uprightBtn.classList.remove("active");
        }
        updateVisuals();
    }

    function updateVisuals() {
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const visualSpread = document.getElementById("visualSpread");
        
        visualSpread.innerHTML = "";

        for (let i = 0; i < config.count; i++) {
            const selectVal = document.getElementById(`card_sel_${i}`)?.value;
            const orientation = currentCardOrientations[i];
            
            // Build the high-fidelity vector dynamic element template
            let svgArt = getPremiumNouveauSvg(selectVal);

            const card = document.createElement("div");
            card.className = `card-frame ${orientation === 'reversed' ? 'reversed-node' : ''}`;
            card.innerHTML = `<div class="card-art-canvas">${svgArt}</div>`;
            visualSpread.appendChild(card);
        }
    }

    function generateAIReading() {
        const question = document.getElementById("question").value.trim() || "General Life Blueprint & Path Alignment";
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const outputNode = document.getElementById("interpretationOutput");
        
        let incomplete = false;
        let readingArr = [];

        for (let i = 0; i < config.count; i++) {
            const val = document.getElementById(`card_sel_${i}`).value;
            if (!val) { incomplete = true; break; }
            
            readingArr.push({
                positionName: config.positions[i],
                orientation: currentCardOrientations[i],
                data: TAROT_DB[val]
            });
        }

        if (incomplete) {
            outputNode.innerHTML = `<div class="placeholder-box" style="color: #f43f5e;">The layout matrix is incomplete. Please choose premium signatures for all active slots.</div>`;
            return;
        }

        outputNode.innerHTML = `
            <div class="ai-loading-container">
                <p style="font-family:'Cinzel', serif; letter-spacing:0.1rem;">Synthesizing Art Nouveau Matrices...</p>
            </div>
        `;

        setTimeout(() => {
            let outputHtml = `
                <div style="margin-bottom: 2.5rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1.5rem;">
                    <span style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; font-weight: bold;">🔮 Seeker Inquiry Focus Field:</span>
                    <h2 style="color: #fff; font-family: 'Cinzel', serif; margin-top: 0.5rem; font-size: 1.6rem;">"${question}"</h2>
                </div>
            `;

            readingArr.forEach((item, index) => {
                outputHtml += `
                    <div class="matrix-block">
                        <div class="matrix-header">
                            <h3>Node ${index + 1}: ${item.positionName}</h3>
                            <span class="orientation-badge up">
                                ${item.data.name} (${item.orientation.toUpperCase()})
                            </span>
                        </div>
                        <p style="line-height: 1.8; color: var(--text-primary);">
                            This premium card archetype maps directly into your inquiry. Its geometric patterns indicate that you are processing deep shifts relative to your environments. Balance your conscious logic with organic instincts to completely integrate this lesson.
                        </p>
                    </div>
                `;
            });

            outputNode.innerHTML = outputHtml;
        }, 800);
    }

    window.onload = initSpreadLayout;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Neko - Advanced Tarot Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Comfortaa:wght@400;700&display=swap');

        :root {
            --bg-cosmic: linear-gradient(135deg, #0b051d 0%, #12092e 40%, #220e4d 70%, #090314 100%);
            --gold: #f3c63f;
            --gold-glow: #fff099;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --glass-bg: rgba(25, 16, 54, 0.4);
            --glass-border: rgba(243, 198, 63, 0.2);
            --text-primary: #f5f3ff;
            --text-secondary: #c0b3e0;
            --cat-eyes: #00ffcc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-cosmic);
            color: var(--text-primary);
            font-family: 'Comfortaa', 'Georgia', cursive, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Twinkling Star Field Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(#fff, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(var(--gold), rgba(243,198,63,.1) 2px, transparent 40px);
            background-size: 400px 400px, 600px 600px;
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            background: linear-gradient(to right, #fff, var(--gold), #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--purple-glow));
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 0.5rem;
            letter-spacing: 0.05rem;
            font-size: 1.1rem;
        }

        .cat-ears-icon {
            font-size: 3rem;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
            margin-bottom: -0.5rem;
            display: inline-block;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 1000px) {
            .studio-grid {
                grid-template-columns: 420px 1fr;
            }
        }

        /* Glassmorphic Panels */
        .panel {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px 0 rgba(5, 2, 15, 0.6);
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border-bottom: 2px dashed var(--glass-border);
            padding-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.75rem;
            position: relative;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 0.6rem;
            letter-spacing: 0.05rem;
        }

        input[type="text"], select {
            width: 100%;
            background: rgba(12, 6, 28, 0.8);
            border: 1px solid rgba(243, 198, 63, 0.3);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(243, 198, 63, 0.3);
            background: rgba(22, 11, 51, 0.9);
        }

        /* Smart Autocomplete Dropdown */
        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-results {
            position: absolute;
            top: 105%;
            left: 0;
            right: 0;
            background: #160c33;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            display: none;
        }

        .autocomplete-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .autocomplete-item:hover {
            background: rgba(243, 198, 63, 0.15);
            color: var(--gold-glow);
            padding-left: 1.5rem;
        }

        /* Card Input Slots */
        .neko-slot-box {
            background: rgba(12, 6, 28, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
        }

        .slot-header {
            font-size: 0.9rem;
            color: var(--gold-glow);
            margin-bottom: 0.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .orientation-box {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .neko-toggle {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(243, 198, 63, 0.2);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .neko-toggle.active {
            background: rgba(243, 198, 63, 0.2);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 8px rgba(243, 198, 63, 0.2);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            border: 2px solid var(--gold);
            color: white;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
            transition: all 0.3s;
            margin-top: 1rem;
            letter-spacing: 0.05rem;
        }

        .action-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.5);
            filter: brightness(1.1);
        }

        /* Dynamic Spread Grid Canvas */
        .visual-spread-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3.5rem;
            padding: 2rem;
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            min-height: 250px;
            align-items: center;
        }

        /* High-Fidelity Human Tarot Illustration Frame */
        .card-frame {
            width: 170px;
            height: 280px;
            background: linear-gradient(145deg, #150b30 0%, #070312 100%);
            border: 2px solid var(--gold);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 12px 28px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0.6rem;
            text-align: center;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
        }

        .card-frame::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(243, 198, 63, 0.2);
            border-radius: 12px;
            pointer-events: none;
            z-index: 2;
        }

        .card-frame:hover {
            box-shadow: 0 0 25px rgba(243, 198, 63, 0.6);
            transform: translateY(-5px);
        }

        .card-frame.reversed-node {
            transform: rotate(180deg);
        }

        .card-frame.reversed-node:hover {
            transform: rotate(180deg) translateY(5px);
        }

        .card-frame.reversed-node .stabilize-text {
            transform: rotate(180deg);
        }

        .position-badge {
            font-size: 0.65rem;
            color: #000;
            background: var(--gold);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 3;
            max-width: 90%;
            margin: 0 auto;
            font-family: 'Cinzel', serif;
        }

        /* Vector Illustration Container */
        .card-art-canvas {
            flex-grow: 1;
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .card-art-canvas svg {
            width: 100%;
            height: 100%;
            max-height: 160px;
        }

        .card-title-lbl {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gold-glow);
            min-height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            z-index: 3;
            border-top: 1px solid rgba(243, 198, 63, 0.15);
            padding-top: 0.4rem;
        }

        /* Deep Interpretation Output Layout */
        .matrix-block {
            background: rgba(15, 8, 36, 0.6);
            border: 1px solid rgba(243, 198, 63, 0.15);
            border-left: 4px solid var(--gold);
            padding: 2rem;
            border-radius: 8px 20px 20px 8px;
            margin-bottom: 2rem;
            animation: popIn 0.5s ease-out forwards;
        }

        .matrix-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.75rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 0.6rem;
        }

        .matrix-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold-glow);
            font-size: 1.2rem;
        }

        .orientation-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
        }

        .orientation-badge.up { background: rgba(0, 255, 204, 0.15); color: var(--cat-eyes); border: 1px solid var(--cat-eyes); }
        .orientation-badge.rev { background: rgba(244, 63, 94, 0.15); color: #f43f5e; border: 1px solid #f43f5e; }

        .meta-section {
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            border-left: 2px solid rgba(255,255,255,0.1);
        }

        .meta-section strong {
            color: var(--gold);
        }

        .summary-container {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(219, 39, 119, 0.1) 100%);
            border: 2px solid var(--gold);
            padding: 2rem;
            border-radius: 20px;
            margin-top: 3rem;
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .summary-container h4 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .placeholder-box {
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            padding: 5rem 0;
            font-size: 1.1rem;
        }

        /* Typing Loader Effect */
        .ai-loading-container {
            text-align: center;
            padding: 3rem 0;
            color: var(--gold);
        }

        .sparkle-icon {
            font-size: 2.5rem;
            animation: spin 2s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

    const SPREAD_CONFIGS = {

        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];

        container.innerHTML = "";
        currentCardOrientations = [];

        for (let i = 0; i < config.count; i++) {
            currentCardOrientations.push("upright");

            const slot = document.createElement("div");
            slot.className = "neko-slot-box";
            slot.innerHTML = `
                <div class="slot-header">
                    <span>🔮 Node #${i + 1}</span>
                    <span style="color: var(--gold);">${config.positions[i]}</span>
                </div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="neko_search_${i}" placeholder="Search card (e.g. 'Fool', 'Wands')..." oninput="handleSearchInput(${i})">
                    <input type="hidden" id="card_sel_${i}">
                    <div class="autocomplete-results" id="neko_res_${i}"></div>
                </div>
                <div class="orientation-box">
                    <button id="btn_u_${i}" class="neko-toggle active" onclick="setOrientation(${i}, 'upright')">Upright ☀️</button>
                    <button id="btn_r_${i}" class="neko-toggle" onclick="setOrientation(${i}, 'reversed')">Reversed 🌙</button>

            container.appendChild(slot);
        }
        updateVisuals();
    }

    function handleSearchInput(index) {
        const inputField = document.getElementById(`neko_search_${index}`);
        const hiddenField = document.getElementById(`card_sel_${index}`);
        const resultBox = document.getElementById(`neko_res_${index}`);
        const query = inputField.value.toLowerCase().trim();

        if (!query) {
            hiddenField.value = "";
            resultBox.style.display = "none";
            updateVisuals();
            return;
        }

        let filtered = Object.keys(TAROT_DB).filter(key => 
            TAROT_DB[key].name.toLowerCase().includes(query) || key.replace(/_/g, " ").includes(query)
        );

        if (filtered.length === 0) {
            resultBox.innerHTML = `<div class="autocomplete-item" style="color: #f43f5e; cursor: default;">Card alignment undetected</div>`;
            resultBox.style.display = "block";
            return;
        }

        resultBox.innerHTML = "";
        filtered.forEach(key => {
            const item = document.createElement("div");
            item.className = "autocomplete-item";
            item.innerText = TAROT_DB[key].name;
            item.onclick = () => {
                inputField.value = TAROT_DB[key].name;
                hiddenField.value = key;
                resultBox.style.display = "none";
                updateVisuals();
            };
            resultBox.appendChild(item);
        });
        resultBox.style.display = "block";
    }

    document.addEventListener("click", function(e) {
        if (!e.target.closest('.autocomplete-wrapper')) {
            document.querySelectorAll('.autocomplete-results').forEach(box => box.style.display = 'none');
        }
    });

    function setOrientation(index, status) {
        currentCardOrientations[index] = status;
        const uprightBtn = document.getElementById(`btn_u_${index}`);
        const reversedBtn = document.getElementById(`btn_r_${index}`);
        
        if (status === "upright") {
            uprightBtn.classList.add("active");
            reversedBtn.classList.remove("active");
        } else {
            reversedBtn.classList.add("active");
            uprightBtn.classList.remove("active");
        }
        updateVisuals();
    }

    function updateVisuals() {
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const visualSpread = document.getElementById("visualSpread");
        
        visualSpread.innerHTML = "";

        for (let i = 0; i < config.count; i++) {
            const selectVal = document.getElementById(`card_sel_${i}`)?.value;
            const orientation = currentCardOrientations[i];
            
            let cardDisplayTitle = "Unmapped Node";

                cardDisplayTitle = TAROT_DB[selectVal].name;
                svgArt = getCardSvgContent(TAROT_DB[selectVal].type, selectVal);

            const card = document.createElement("div");
            card.className = `card-frame ${orientation === 'reversed' ? 'reversed-node' : ''}`;

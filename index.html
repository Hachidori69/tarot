            --gold: #f3c63f;
            --gold-glow: #fff099;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --glass-bg: rgba(25, 16, 54, 0.4);
            --glass-border: rgba(243, 198, 63, 0.2);
            --text-primary: #f5f3ff;
            --text-secondary: #c0b3e0;
            --cat-eyes: #00ffcc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-cosmic);
            color: var(--text-primary);
            font-family: 'Comfortaa', 'Georgia', cursive, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Twinkling Star Field Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(#fff, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(var(--gold), rgba(243,198,63,.1) 2px, transparent 40px);
            background-size: 400px 400px, 600px 600px;
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            background: linear-gradient(to right, #fff, var(--gold), #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--purple-glow));
            text-transform: uppercase;
        }

        header p {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 0.5rem;
            letter-spacing: 0.05rem;
            font-size: 1.1rem;
        }

        .cat-ears-icon {
            font-size: 3rem;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
            margin-bottom: -0.5rem;
            display: inline-block;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 1000px) {
            .studio-grid {
                grid-template-columns: 420px 1fr;
            }

            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px 0 rgba(5, 2, 15, 0.6);
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border-bottom: 2px dashed var(--glass-border);
            padding-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.75rem;
            position: relative;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 0.6rem;
            letter-spacing: 0.05rem;
        }

            width: 100%;
            background: rgba(12, 6, 28, 0.8);
            border: 1px solid rgba(243, 198, 63, 0.3);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(243, 198, 63, 0.3);
            background: rgba(22, 11, 51, 0.9);
        }

        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-results {
            position: absolute;
            top: 105%;
            left: 0;
            right: 0;
            background: #160c33;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            display: none;

            padding: 0.8rem 1.2rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            font-size: 0.95rem;

        .autocomplete-item:hover {
            background: rgba(243, 198, 63, 0.15);
            color: var(--gold-glow);
            padding-left: 1.5rem;
        }

            margin-bottom: 0.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;

            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(243, 198, 63, 0.2);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;

            background: rgba(243, 198, 63, 0.2);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 8px rgba(243, 198, 63, 0.2);
        }

            width: 100%;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            border: 2px solid var(--gold);
            color: white;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
            transition: all 0.3s;
            margin-top: 1rem;
            letter-spacing: 0.05rem;

            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.5);
            filter: brightness(1.1);

            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.15);
            border-radius: 20px;
            min-height: 200px;
            align-items: center;

            height: 230px;

            border: 2px solid var(--gold);
            border-radius: 14px;

            justify-content: space-between;
            padding: 0.75rem;
            text-align: center;

            box-shadow: 0 0 15px var(--gold);
        }

            transform: rotate(180deg);
        }

            border-radius: 6px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

            align-items: center;
            justify-content: center;

            color: #fff;

            display: flex;
            align-items: center;

            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.05rem;
            text-transform: uppercase;

        .orientation-badge.rev { background: rgba(244, 63, 94, 0.15); color: #f43f5e; border: 1px solid #f43f5e; }

        .meta-section {
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            border-left: 2px solid rgba(255,255,255,0.1);
        }

        .meta-section strong {
            color: var(--gold);
        }

        .summary-container {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(219, 39, 119, 0.1) 100%);
            border: 2px solid var(--gold);
            padding: 2rem;
            border-radius: 20px;
            margin-top: 3rem;
            box-shadow: 0 0 20px var(--purple-glow);

        .summary-container h4 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .placeholder-box {
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            padding: 5rem 0;
            font-size: 1.1rem;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

    // Advanced Spread Layout Options Mapping Configuration
    const SPREAD_CONFIGS = {
        "1card": { count: 1, positions: ["Immediate Alignment/Daily Oracle"] },
        "4card": { count: 4, positions: ["Current Foundation", "Immediate Roadblock", "Higher Mind Advice", "Targeted Future Outcome"] },
        "5card": { count: 5, positions: ["Past Roots", "Active Present", "Core Synthesis Block", "Hidden Subconscious Realities", "Future Horizons"] },
        "7horseshoe": { count: 7, positions: ["Past Influences", "Present Stance", "Hidden Factors", "The Core Challenge", "External Environment", "Best Action Advice", "Final Karmic Destination"] },
        "10celtic": { count: 10, positions: ["Core Present Presence", "Crossing Obstacle", "Higher Ideals Target", "Root Foundation Subconscious", "Recent Past Departure", "Immediate Coming Influence", "Your Current Self Mirror", "External Environmental Forces", "Deep Hopes & Internal Fears", "Ultimate Long-term Manifestation"] },
        "12astrological": { count: 12, positions: ["1st House: Self & Vitality", "2nd House: Assets & Money", "3rd House: Communication & Peers", "4th House: Home & Roots", "5th House: Creativity & Joy", "6th House: Health & Daily Duties", "7th House: Partnerships & Contracts", "8th House: Rebirth & Joint Resources", "9th House: Philosophy & Long Travel", "10th House: Career & Status", "11th House: Networks & Hopes", "12th House: Subconscious Shadow & Karma"] }
    };

    let currentCardOrientations = [];

    // Initializes the layout injection process
    function initSpreadLayout() {
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const container = document.getElementById("cardInputsContainer");
        
        container.innerHTML = "";
        currentCardOrientations = [];

        for (let i = 0; i < config.count; i++) {
            currentCardOrientations.push("upright");

            const slot = document.createElement("div");
            slot.className = "neko-slot-box";
            slot.innerHTML = `
                <div class="slot-header">
                    <span>🐾 Node #${i + 1}</span>
                    <span style="color: var(--gold);">${config.positions[i]}</span>
                </div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="neko_search_${i}" placeholder="Type name (e.g. 'Fool', 'Cups')..." oninput="handleSearchInput(${i})">
                    <input type="hidden" id="card_sel_${i}">
                    <div class="autocomplete-results" id="neko_res_${i}"></div>
                </div>
                <div class="orientation-box">
                    <button id="btn_u_${i}" class="neko-toggle active" onclick="setOrientation(${i}, 'upright')">Upright ☀️</button>
                    <button id="btn_r_${i}" class="neko-toggle" onclick="setOrientation(${i}, 'reversed')">Reversed 🌙</button>
                </div>
            `;
            container.appendChild(slot);
        }
        updateVisuals();
    }

    // Smart Autocomplete Logic Core
    function handleSearchInput(index) {
        const inputField = document.getElementById(`neko_search_${index}`);
        const hiddenField = document.getElementById(`card_sel_${index}`);
        const resultBox = document.getElementById(`neko_res_${index}`);
        const query = inputField.value.toLowerCase().trim();

        // Wipe hidden values if field is empty
        if (!query) {
            hiddenField.value = "";
            resultBox.style.display = "none";
            updateVisuals();
            return;
        }

        let filtered = Object.keys(TAROT_DB).filter(key => 
            TAROT_DB[key].name.toLowerCase().includes(query) || key.replace(/_/g, " ").includes(query)
        );

        if (filtered.length === 0) {
            resultBox.innerHTML = `<div class="autocomplete-item" style="color: #f43f5e; cursor: default;">No mystical card found</div>`;
            resultBox.style.display = "block";
            return;
        }

        resultBox.innerHTML = "";
        filtered.forEach(key => {
            const item = document.createElement("div");
            item.className = "autocomplete-item";
            item.innerText = TAROT_DB[key].name;
            item.onclick = () => {
                inputField.value = TAROT_DB[key].name;
                hiddenField.value = key;
                resultBox.style.display = "none";
                updateVisuals();
            };
            resultBox.appendChild(item);
        });
        resultBox.style.display = "block";
    }

    // Closes open suggestions menus safely if user clicks outside fields
    document.addEventListener("click", function(e) {
        if (!e.target.closest('.autocomplete-wrapper')) {
            document.querySelectorAll('.autocomplete-results').forEach(box => box.style.display = 'none');
        }
    });

    function setOrientation(index, status) {
        currentCardOrientations[index] = status;
        const uprightBtn = document.getElementById(`btn_u_${index}`);
        const reversedBtn = document.getElementById(`btn_r_${index}`);
        
        if (status === "upright") {
            uprightBtn.classList.add("active");
            reversedBtn.classList.remove("active");
        } else {
            reversedBtn.classList.add("active");
            uprightBtn.classList.remove("active");
        }
        updateVisuals();
    }

    // Updates physical layout presentation array matching user selection signatures
    function updateVisuals() {
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const visualSpread = document.getElementById("visualSpread");
        
        visualSpread.innerHTML = "";

        for (let i = 0; i < config.count; i++) {
            const selectVal = document.getElementById(`card_sel_${i}`)?.value;
            const orientation = currentCardOrientations[i];
            
            let cardDisplayTitle = "Unawakened Arcana";
            let glyph = "🐾";

            if (selectVal && TAROT_DB[selectVal]) {
                cardDisplayTitle = TAROT_DB[selectVal].name.split(" (")[0]; // Clean short name
                glyph = selectVal.includes("wands") ? "🪄🐱" : 
                        selectVal.includes("cups") ? "🍷🐱" : 
                        selectVal.includes("swords") ? "⚔️🐱" : 
                        selectVal.includes("pentacles") ? "🪙🐱" : "👁️🔮";
            }

            const card = document.createElement("div");
            card.className = `card-frame ${orientation === 'reversed' ? 'reversed-node' : ''}`;
            card.innerHTML = `
                <div class="stabilize-text position-badge">${config.positions[i].split(":")[0]}</div>
                <div class="neko-art-box">${glyph}</div>
                <div class="stabilize-text">
                    <div class="card-title-lbl">${cardDisplayTitle}</div>
                </div>
            `;
            visualSpread.appendChild(card);
        }
    }

    // Combines text nodes to output the final layout reading
    function generateReading() {
        const question = document.getElementById("question").value.trim();
        const type = document.getElementById("spreadSelect").value;
        const config = SPREAD_CONFIGS[type];
        const outputNode = document.getElementById("interpretationOutput");
        
        let outputHtml = "";
        let incomplete = false;
        let readingArr = [];

        for (let i = 0; i < config.count; i++) {
            const val = document.getElementById(`card_sel_${i}`).value;
            if (!val) { incomplete = true; break; }
            
            readingArr.push({
                positionName: config.positions[i],
                orientation: currentCardOrientations[i],
                data: TAROT_DB[val]
            });
        }

        if (incomplete) {
            outputNode.innerHTML = `<div class="placeholder-box" style="color: #f43f5e;">The ritual layout is incomplete. Please select valid card structures in all slots.</div>`;
            return;
        }

        if (question) {
            outputHtml += `
                <div style="margin-bottom: 2.5rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1.5rem;">
                    <span style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; font-weight: bold; letter-spacing: 0.05rem;">🔮 Inquiry Focus Field:</span>
                    <h2 style="color: #fff; font-family: 'Cinzel', serif; font-weight: normal; margin-top: 0.5rem; font-size: 1.6rem; text-shadow: 0 0 10px var(--purple-glow);">"${question}"</h2>
                </div>
            `;
        }

        readingArr.forEach(item => {
            const explanationText = item.orientation === "upright" ? item.data.upright : item.data.reversed;
            outputHtml += `
                <div class="matrix-block">
                    <div class="matrix-header">
                        <h3>${item.positionName}</h3>
                        <span class="orientation-badge ${item.orientation === 'upright' ? 'up' : 'rev'}">
                            ${item.data.name} [${item.orientation}]
                        </span>
                    </div>
                    <p style="line-height: 1.8; color: var(--text-primary); font-size: 1.05rem;">${explanationText}</p>
                    <div class="meta-section">
                        <strong>Hermetic Feline Archetypes:</strong> ${item.data.archetypes || "Elemental Forces"} <br>
                        <span style="font-size: 0.85rem; color: var(--text-secondary); font-style: italic; display:block; margin-top:0.4rem;">Source Profile Reference: Complete Kabbalistic Tarot Lexicon & Feline Psychology Standards.</span>
                    </div>
                </div>
            `;
        });

        // Conclusion matrix summary output box
        outputHtml += `
            <div class="summary-container">
                <h4>🐾 The Grand Neko Synthesis</h4>
                <p style="line-height: 1.8; color: var(--text-primary);">
                    The alignment of your drawn signatures outlines a clear blueprint. As these cards interact through your chosen matrix, they reveal that your inquiry is navigating structural macro-cycles. Do not force actions prematurely; instead, mirror the graceful, calculated patience of the stalking panther. The pathway ahead reveals itself when external noise is muted.
                </p>
            </div>
        `;

        outputNode.innerHTML = outputHtml;
    }

    // Set initialization run triggers on document load loop
    window.onload = initSpreadLayout;
</script>
